controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    bunker_velocity_controller:
      type: diff_drive_controller/DiffDriveController

bunker_velocity_controller:
  ros__parameters:
    left_wheel_names: ['back_wheel_L_joint','front_wheel_L_joint']
    right_wheel_names: ['back_wheel_R_joint','front_wheel_R_joint']
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    cmd_vel_timeout: 0.25
    velocity_rolling_window_size: 2

    #use unstamped vel else have to change the output of twist mux to stamped
    use_stamped_vel: false

    wheel_separation: 0.7  #0.1  # 0.256  # 0.512
    wheels_per_side: 1  # actually 2, but both are controlled by 1 signal
    wheel_radius: 0.15

    # Base frame_id
    base_frame_id: base_link
    odom_frame_id: odom

    # Odometry fused with IMU is published by robot_localization, so
    # no need to publish a TF based on encoders alone.
    enable_odom_tf: false

    # Wheel separation and radius multipliers
    wheel_separation_multiplier: 3.0
    left_wheel_radius_multiplier: 0.5
    right_wheel_radius_multiplier: 0.5

    # Velocity and acceleration limits
    # Whenever a min_* is unspecified, default to -max_*
    linear:
      x:
        has_velocity_limits    : true
        max_velocity           : 2.5   # m/s
        has_acceleration_limits: true
        max_acceleration       : 5.0   # m/s^2
    angular:
      z:
        has_velocity_limits    : true
        max_velocity           : 6.0   # rad/s
        has_acceleration_limits: true
        max_acceleration       : 12.0   # rad/s^2