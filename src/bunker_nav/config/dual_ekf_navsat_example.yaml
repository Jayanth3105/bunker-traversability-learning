navsat_transform:
  ros__parameters:
    use_sim_time: false
    frequency: 15.0
    delay: 0.0
    magnetic_declination_radians: 0.13933544613 #0.13933544613
    yaw_offset: 0.0 #use madgwick filter at ENU framee, read 0 facing east
    # magnetic_declination_radians: 0.0429351  # For lat/long 55.944831, -3.186998
    # yaw_offset: 1.570796327  # IMU reads 0 facing magnetic north, not east
    zero_altitude: true
    broadcast_utm_transform: true
    # broadcast_utm_transform_as_parent_frame: true
    publish_filtered_gps: true
    use_odometry_yaw: false
    # use_odometry_yaw: true
    # wait_for_datum: true #(33.65, 130.67, 81.90)
    # datum: [33.65371084166, 130.67100212166, 80.67]
    wait_for_datum: false
    

